<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC Smart Validator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container-fluid login-page">

    <div class="row vh-100">

        <div class="col-lg-7 left-panel">

            <div class="overlay">

                <h1>KYC SMART VALIDATOR</h1>

                <h4>Enterprise Customer Onboarding Portal</h4>

                <p>
                    Validate PAN & Aadhaar instantly with secure,
                    fast and intelligent KYC verification.
                </p>

            </div>

        </div>

        <div class="col-lg-5 d-flex justify-content-center align-items-center">

            <div class="login-card shadow-lg">

                <h2 class="text-center mb-4">
                    Login
                </h2>

                <form>

                    <div class="mb-3">

                        <label>Username</label>

                        <input
                        type="text"
                        class="form-control"
                        placeholder="Enter Username">

                    </div>

                    <div class="mb-4">

                        <label>Password</label>

                        <input
                        type="password"
                        class="form-control"
                        placeholder="Enter Password">

                    </div>

                    <button
                    class="btn btn-primary w-100"
                    type="button"
                    onclick="login()">

                    Login

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
